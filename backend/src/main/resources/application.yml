server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/rexbooking
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

app:
  jwt:
    secret: REPLACE_WITH_AT_LEAST_32_CHARACTERS_SECRET_KEY_REX_2026
    expiration-seconds: 86400
  booking:
    hold-minutes: 10
    expire-delay-ms: 60000
  mail:
    enabled: false
    from: noreply@rex.local
