server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:rex_booking}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:rex}
    password: ${DB_PASSWORD:rex123}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

app:
  jwt:
    secret: ${APP_JWT_SECRET:REPLACE_WITH_AT_LEAST_32_CHARACTERS_SECRET_KEY_REX_2026}
    expiration-seconds: 86400
  booking:
    hold-minutes: 10
    expire-delay-ms: 60000
  mail:
    enabled: false
    from: noreply@rex.local
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  vnpay:
    mock-secret: ${VNPAY_MOCK_SECRET:RexHotelVNPayMockSecretKey2026}
    mock-return-url: ${VNPAY_RETURN_URL:http://localhost:5173/payment/result}
