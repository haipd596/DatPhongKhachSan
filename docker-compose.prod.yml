services:
  mysql:
    image: mysql:8.4
    container_name: rex_mysql_prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-rex_booking}
      MYSQL_USER: ${DB_USER:-rex}
      MYSQL_PASSWORD: ${DB_PASSWORD:-rex123}
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - mysql_prod_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD:-root123} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: rex_backend_prod
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-rex_booking}
      DB_USER: ${DB_USER:-rex}
      DB_PASSWORD: ${DB_PASSWORD:-rex123}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-REPLACE_WITH_A_SECURE_SECRET_VALUE}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${DB_NAME:-rex_booking}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: rex_frontend_prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_prod_data:
