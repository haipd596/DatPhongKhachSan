services:
  mysql:
    image: mysql:8.4
    container_name: rex_booking_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: rex_booking
      MYSQL_USER: rex
      MYSQL_PASSWORD: rex123
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot123 --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
